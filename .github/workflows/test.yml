name: Test

on:
  push:
    branches-ignore: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: garnish
          POSTGRES_PASSWORD: garnish
          POSTGRES_DB: garnish_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: backend
      - name: Setup database
        env:
          RAILS_ENV: test
          DB_HOST: localhost
          DB_PORT: "5432"
          DB_USERNAME: garnish
          DB_PASSWORD: garnish
          JWT_SECRET: test_secret
        run: bin/rails db:setup
      - name: Run tests
        env:
          RAILS_ENV: test
          DB_HOST: localhost
          DB_PORT: "5432"
          DB_USERNAME: garnish
          DB_PASSWORD: garnish
          JWT_SECRET: test_secret
        run: bin/rails test

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
